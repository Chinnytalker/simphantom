{% extends 'base.html' %}
{% block title %}Password Changed — SimPhantom{% endblock %}
{% block main_class %}{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-4rem)] bg-white dark:bg-zinc-900 px-6">
  <div class="w-full max-w-sm text-center">

    <div class="w-16 h-16 rounded-2xl bg-green-600/10 dark:bg-green-600/20 flex items-center justify-center mx-auto mb-5">
      <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>

    <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white mb-2">Password changed!</h1>
    <p class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed mb-8">
      Your password has been updated. You can now sign in with your new password.
    </p>

    <a href="{% url 'login' %}"
       class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl
              transition focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm">
      Sign in
    </a>
  </div>
</div>
{% endblock %}
