{% extends 'base.html' %}
{% block title %}Page Not Found | SimPhantom{% endblock %}
{% block main_class %}{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-4rem)] bg-white dark:bg-zinc-900 px-6">
  <div class="w-full max-w-md text-center">

    <p class="text-8xl font-black text-gray-100 dark:text-zinc-800 select-none mb-2">404</p>

    <div class="w-16 h-16 rounded-2xl bg-blue-600/10 dark:bg-blue-600/20 flex items-center justify-center mx-auto -mt-8 mb-5 relative z-10">
      <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>

    <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white mb-2">Page not found</h1>
    <p class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed mb-8">
      The page you're looking for doesn't exist or has been moved.
    </p>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/"
         class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl
                transition focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm">
        Go Home
      </a>
      <a href="/services/"
         class="inline-block border border-gray-200 dark:border-zinc-700 text-gray-700 dark:text-gray-300
                hover:text-gray-900 dark:hover:text-white font-semibold py-3 px-6 rounded-xl transition text-sm">
        Browse Services
      </a>
    </div>
  </div>
</div>
{% endblock %}
