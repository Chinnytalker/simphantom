services:

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - static_volume:/app/staticfiles
    expose:
      - "8000"

  cron:
    build: .
    restart: unless-stopped
    env_file: .env
    entrypoint: []
    command: >
      sh -c "
        echo 'Starting SimPhantom cron worker...' &&
        while true; do
          python manage.py expire_orders &&
          sleep 3600
        done &
        while true; do
          python manage.py send_renewal_reminders &&
          sleep 21600
        done
      "
    depends_on:
      - web

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  static_volume:
