<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0c0a2e"/>
    </linearGradient>
    <linearGradient id="sp-txt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="50" cy="50" r="50" fill="url(#sp-bg)"/>
  <!-- Subtle border glow -->
  <circle cx="50" cy="50" r="49" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.4"/>
  <!-- SP monogram -->
  <text x="50" y="65"
        text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-weight="800"
        font-size="46"
        letter-spacing="-2"
        fill="url(#sp-txt)">SP</text>
</svg>
